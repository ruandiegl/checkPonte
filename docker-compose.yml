services:
  postgres:
    image: postgres:16-alpine
    container_name: vulcano-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vulcano_checklist
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - vulcano_postgres_data:/var/lib/postgresql/data

volumes:
  vulcano_postgres_data:
